basePath: /
definitions:
  dto.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.CreateGameRequest:
    properties:
      cover_image_url:
        type: string
      description:
        type: string
      name:
        type: string
      status:
        enum:
        - NOW_PLAYING
        - BACKLOG
        - WISHLIST
        type: string
    required:
    - name
    type: object
  dto.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  dto.GameResponse:
    properties:
      completed:
        type: boolean
      cover_image_url:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    type: object
  dto.SuccessResponse:
    properties:
      message:
        type: string
    type: object
  dto.UpdateGameRequest:
    properties:
      completed:
        type: boolean
      cover_image_url:
        type: string
      description:
        type: string
      name:
        type: string
      status:
        enum:
        - NOW_PLAYING
        - BACKLOG
        - WISHLIST
        type: string
    type: object
  dto.UserResponse:
    properties:
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
    type: object
info:
  contact: {}
  description: API para gestionar autenticacion y catalogo de juegos.
  title: GameVault API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Inicia sesion y retorna token JWT.
      parameters:
      - description: Credenciales
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Iniciar sesion
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Crea un nuevo usuario y retorna el token de autenticacion.
      parameters:
      - description: Datos de registro
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Registrar usuario
      tags:
      - auth
  /api/games:
    get:
      consumes:
      - application/json
      description: Retorna el listado de juegos del usuario autenticado.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Filtrar por estado
        enum:
        - NOW_PLAYING
        - BACKLOG
        - WISHLIST
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.GameResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Listar juegos
      tags:
      - games
    post:
      consumes:
      - application/json
      description: Crea un juego asociado al usuario autenticado.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Datos del juego
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateGameRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.GameResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Crear juego
      tags:
      - games
  /api/games/{id}:
    delete:
      consumes:
      - application/json
      description: Elimina un juego del usuario autenticado.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: ID del juego
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Eliminar juego
      tags:
      - games
    get:
      consumes:
      - application/json
      description: Retorna un juego por su ID si pertenece al usuario autenticado.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: ID del juego
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GameResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Obtener juego por ID
      tags:
      - games
    put:
      consumes:
      - application/json
      description: Actualiza campos de un juego del usuario autenticado.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: ID del juego
        in: path
        name: id
        required: true
        type: string
      - description: Campos a actualizar
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateGameRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GameResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Actualizar juego
      tags:
      - games
securityDefinitions:
  BearerAuth:
    description: 'Ingresa el token con formato: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
